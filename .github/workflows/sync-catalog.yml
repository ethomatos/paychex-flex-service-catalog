name: Sync Datadog Service Catalog

on:
  push:
    branches: [main]
    paths:
      - 'entity.datadog.yaml'
  workflow_dispatch:

jobs:
  sync-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload service catalog entities
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
        run: |
          pip install pyyaml requests --quiet
          python3 - <<'EOF'
          import yaml, json, requests, os, sys

          headers = {
              'DD-API-KEY': os.environ['DD_API_KEY'],
              'DD-APPLICATION-KEY': os.environ['DD_APP_KEY'],
              'Content-Type': 'application/json',
          }

          with open('entity.datadog.yaml') as f:
              entities = [d for d in yaml.safe_load_all(f) if d]

          failed = 0
          for entity in entities:
              name = entity.get('metadata', {}).get('name', '?')
              resp = requests.post(
                  'https://api.datadoghq.com/api/v2/catalog/entity',
                  json=entity,
                  headers=headers,
              )
              if resp.ok:
                  print(f"OK {resp.status_code}: {name}")
              else:
                  print(f"ERROR {resp.status_code}: {name} — {resp.text}", file=sys.stderr)
                  failed += 1

          if failed:
              sys.exit(1)
          print(f"Done: {len(entities)} entities uploaded.")
          EOF
