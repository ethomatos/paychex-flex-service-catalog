name: Sync Datadog Service Catalog

on:
  push:
    branches: [main]
    paths:
      - 'entity.datadog.yaml'
  workflow_dispatch:

jobs:
  sync-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install datadog-ci
        run: npm install -g @datadog/datadog-ci

      - name: Upload service catalog entities
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: datadoghq.com
        run: datadog-ci catalog upload entity.datadog.yaml
