# Platform tier — edge & auth (everything depends on these)
# =============================================================================
apiVersion: v3
kind: service
metadata:
  name: flex-api-gateway
  displayName: "Flex API Gateway"
  description: "Public API edge for Paychex Flex. Terminates TLS, enforces rate limits, routes to internal services."
  tags:
    - system:paychex-flex
    - domain:platform
    - cloud:azure
    - runtime:java
  owner: paychex-platform-engineering
spec:
  lifecycle: production
  tier: "0"
  type: web
  languages:
    - java
  componentOf:
    - system:paychex-flex
  dependsOn:
    - service:flex-auth-service

---
apiVersion: v3
kind: service
metadata:
  name: flex-auth-service
  displayName: "Flex Auth Service"
  description: "Login, SSO, MFA, token issue/refresh for employer admins, employees, and partners. Multi-tenant identity."
  tags:
    - system:paychex-flex
    - domain:platform
    - cloud:azure
    - runtime:dotnet
  owner: paychex-platform-engineering
spec:
  lifecycle: production
  tier: "0"
  type: web
  languages:
    - csharp
  componentOf:
    - system:paychex-flex

---
apiVersion: v3
kind: service
metadata:
  name: flex-notification-service
  displayName: "Flex Notification Service"
  description: "Email and SMS dispatcher for payroll confirmations, benefits enrollment reminders, and recruiting alerts."
  tags:
    - system:paychex-flex
    - domain:platform
    - cloud:azure
    - runtime:java
  owner: paychex-platform-engineering
spec:
  lifecycle: production
  tier: "1"
  type: custom
  languages:
    - java
  componentOf:
    - system:paychex-flex
  dependsOn:
    - queue:flex-notification-queue

