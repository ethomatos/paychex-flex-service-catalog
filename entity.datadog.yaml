# Paychex Flex — Datadog Software Catalog (schema v3.0)
#
# Datadog's GitHub integration auto-discovers any file named `entity.datadog.yaml`
# or `service.datadog.yaml` in connected repositories and syncs the entities into
# the Software Catalog. No GitHub Action or API call is required — connect the repo
# under Integrations → GitHub, and the catalog populates on next sync.
#
# Topology:
#   1 system        — paychex-flex (parent)
#   12 services     — payroll, time, HR, recruiting, benefits, analytics, platform
#   4 datastores    — Azure SQL + Synapse
#   2 queues        — Kafka + Azure Service Bus
#
# Multi-document YAML: each entity is separated by `---`.

---
# =============================================================================
# Parent system
# =============================================================================
apiVersion: v3
kind: system
metadata:
  name: paychex-flex
  displayName: "Paychex Flex"
  description: "Paychex's flagship B2B SaaS platform for payroll, HR, benefits, time & attendance, recruiting, and analytics. Serves ~16K Paychex employees operating the platform and hundreds of thousands of small/mid-market employer clients."
  tags:
    - system:paychex-flex
    - cloud:azure
  owner: paychex-monitoring-engineering
  additionalOwners:
    - name: Paychex Platform Engineering
      type: stakeholder
  links:
    - name: Paychex Flex product page
      type: doc
      url: https://www.paychex.com/
    - name: Runbook
      type: runbook
      url: https://torii.datadoghq.com/
spec:
  lifecycle: production
  tier: "0"
  components:
    - service:flex-api-gateway
    - service:flex-auth-service
    - service:flex-payroll-web
    - service:flex-payroll-api
    - service:flex-payroll-engine
    - service:flex-taxpay-service
    - service:flex-time-clock-api
    - service:flex-hr-employee-records-api
    - service:flex-recruit-copilot-service
    - service:flex-benefits-enrollment-api
    - service:flex-notification-service
    - service:flex-analytics-query-api
    - datastore:flex-payroll-db
    - datastore:flex-hr-db
    - datastore:flex-time-db
    - datastore:flex-analytics-warehouse
    - queue:flex-payroll-batch-queue
    - queue:flex-notification-queue

---
